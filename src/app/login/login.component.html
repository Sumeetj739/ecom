
<section class="login-section">
    <div class="login-container">
      <h2>Login to Your Account</h2>
      <form>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required [(ngModel)]="email"/>
        </div>

        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required [(ngModel)]="password" />
        </div>

        <button type="submit" class="login-btn" (click)="isLoggedIn()">Login</button>



        <p class="signup-text">
          Don't have an account? <a routerLink="/register">Sign up here</a>
        </p>
      </form>
    </div>
  </section>
